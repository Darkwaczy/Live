directories:
  output: dist
  buildResources: build
appId: com.sermonsync.app
productName: SermonSync
files:
  - filter:
      - dist/**
      - dist-electron/**
      - package.json
win:
  target:
    - nsis
  publisherName: SermonSync
nsis:
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true
electronVersion: 26.6.10
