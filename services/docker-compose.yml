version: '3.8'

services:
  n-atlas:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: n-atlas-speech-service
    ports:
      - "5000:5000"
    environment:
      - TORCH_HOME=/cache/torch
      - HF_HOME=/cache/huggingface
    volumes:
      # Persist model cache to avoid re-downloading
      - n-atlas-cache:/root/.cache/n_atlas
      - torch-cache:/cache/torch
      - huggingface-cache:/cache/huggingface
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  n-atlas-cache:
  torch-cache:
  huggingface-cache:
